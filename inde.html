<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jacopo Marchesoni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header></header>
    <main>
      <section id="hero" class="hero-wrapper">
        <video
          class="hero__video"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
        >
          <source src="./assets/hero.mp4" type="video/mp4" />
        </video>
        <div class="hero__content">
          <div class="header">
            <a href="#hero" class="header-link"
              ><img
                src="./assets/logo.svg"
                class="header_logo"
                height="97"
                width="77"
                alt="Jacopo Marchesoni Logo"
            /></a>
            <button class="header_btn">Contact Us</button>
          </div>
          <h1 class="visually-hidden">Jacopo Marchesoni Portfolio</h1>
          <ul class="hero-nav">
            <li class="hero-nav_item">
              <img src="./assets/arrow.svg" alt="" class="hero--link_icon" />
              <a href="" class="hero-item_link">About</a>
            </li>
            <li class="hero-nav_item">
              <img src="./assets/arrow.svg" alt="" class="hero--link_icon" />
              <a href="" class="hero-item_link">Projects</a>
            </li>
            <li class="hero-nav_item">
              <img src="./assets/arrow.svg" alt="" class="hero--link_icon" />
              <a href="" class="hero-item_link">Founder</a>
            </li>
          </ul>
        </div>
      </section>
    </main>
    <footer></footer>
    <script src="./js/main.js"></script>
  </body>
</html>
